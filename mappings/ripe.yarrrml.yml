# Research Integrity Provenance and Evidence Knowledge Graph (RIPE-KG) - YARRRML mappings
# Maps assessments_yarrrml.json -> RIPE-KG triples using RIPE-O terms
# Mapping version: 1.0.0
# Source: assessments/assessments_yarrrml.json

prefixes:
  ripe: "https://w3id.org/ripe/ripe-o#"
  ripekg: "https://w3id.org/ripe/ripe-kg/"
  tido: "https://w3id.org/tido#"
  prov: "http://www.w3.org/ns/prov#"
  dcterms: "http://purl.org/dc/terms/"
  prism: "http://prismstandard.org/namespaces/basic/3.0/"
  foaf: "http://xmlns.com/foaf/0.1/"
  schema: "https://schema.org/"
  dbo: "http://dbpedia.org/ontology/"
  cito: "http://purl.org/spar/cito/"
  fabio: "http://purl.org/spar/fabio/"
  owl: "http://www.w3.org/2002/07/owl#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  rdfs: "http://www.w3.org/2000/01/rdf-schema#"
  org: "http://www.w3.org/ns/org#"
  sd: "https://w3id.org/okn/o/sd#"
  idlab-fn: "https://w3id.org/imec/idlab/function#"
  grel: "http://users.ugent.be/~bjdmeest/function/grel.ttl#"

mappings:
  # APPLICATION INSTANCES

  inspectAI:
    sources: &inspectai_static
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[0]"
    s: "https://w3id.org/ripe/ripe-kg/automated-agent/inspect-ai/1.0.0"
    po:
      - [a, ripe:AutomatedAgent]
      - [a, sd:Software]
      - [rdfs:label, "INSPECT-AI 1.0.0"]
      - [dcterms:title, "INSPECT-AI"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "INSPECT-AI 1.0.0 is the automated software system used to support research integrity assessment in the RIPE-KG.",
        ]
      - [sd:hasVersionId, "1.0.0"]

  retractionWatchSource:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/source/retraction-watch"
    po:
      - [a, prov:Organization]
      - [rdfs:label, "Retraction Watch"]
      - [
          rdfs:comment,
          "Retraction Watch is represented as an external data source used by INSPECT-AI to retrieve publication notices.",
        ]
      - [foaf:name, "Retraction Watch Database"]
      - p: foaf:homepage
        o:
          value: "https://retractionwatch.com"
          type: iri

  pubPeerSource:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/source/pubpeer"
    po:
      - [a, prov:Organization]
      - [rdfs:label, "PubPeer"]
      - [
          rdfs:comment,
          "PubPeer is represented as an external data source used by INSPECT-AI to retrieve post-publication peer comments.",
        ]
      - [foaf:name, "PubPeer"]
      - p: foaf:homepage
        o:
          value: "https://pubpeer.com"
          type: iri

  clinicalTrialsGovSource:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/source/clinicaltrials-gov"
    po:
      - [a, prov:Organization]
      - [rdfs:label, "ClinicalTrials.gov"]
      - [
          rdfs:comment,
          "ClinicalTrials.gov is represented as an external registry data source used by INSPECT-AI.",
        ]
      - [foaf:name, "ClinicalTrials.gov"]
      - p: foaf:homepage
        o:
          value: "https://clinicaltrials.gov"
          type: iri

  whoICTRPSource:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/source/who-ictrp"
    po:
      - [a, prov:Organization]
      - [rdfs:label, "WHO ICTRP"]
      - [
          rdfs:comment,
          "The WHO International Clinical Trials Registry Platform is represented as an external registry data source used by INSPECT-AI.",
        ]
      - [foaf:name, "WHO International Clinical Trials Registry Platform"]
      - p: foaf:homepage
        o:
          value: "https://trialsearch.who.int"
          type: iri

  retractionAssessmentQuestion:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/retraction-status/1.0.0"
    po:
      - [a, ripe:IntegrityAssessmentQuestion]
      - [rdfs:label, "1.1. Does the study have an associated retraction?"]
      - [dcterms:identifier, "1.1"]
      - [dcterms:title, "retraction status"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "This integrity assessment question records whether a work has an associated retraction, typically on the basis of retraction notice evidence.",
        ]

  postPublicationAssessmentQuestion:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/post-publication-notices/1.0.0"
    po:
      - [a, ripe:IntegrityAssessmentQuestion]
      - [
          rdfs:label,
          "1.2. Does the study have an associated expression of concern or other relevant post-publication notice?",
        ]
      - [dcterms:identifier, "1.2"]
      - [dcterms:title, "post-publication notices"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "This integrity assessment question records whether a work has associated expressions of concern, corrections, peer comments, or other relevant post-publication notices.",
        ]

  researchTeamAssessmentQuestion:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/research-team-related-concerns/1.0.0"
    po:
      - [a, ripe:IntegrityAssessmentQuestion]
      - [
          rdfs:label,
          "1.3. Do other studies by the research team highlight causes for concern?",
        ]
      - [dcterms:identifier, "1.3"]
      - [dcterms:title, "research-team-related concerns"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "This integrity assessment question records whether evidence linked to authors associated with a work indicates concerns arising from other studies by the research team.",
        ]

  registrationAssessmentQuestion:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/study-registration/1.0.0"
    po:
      - [a, ripe:IntegrityAssessmentQuestion]
      - [
          rdfs:label,
          "2.2. Are there concerns relating to the timing or absence of study registration?",
        ]
      - [dcterms:identifier, "2.2"]
      - [dcterms:title, "study registration"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "This integrity assessment question records whether registry and study-design evidence indicates concerns about the timing or absence of registration for a work.",
        ]

  overallAssessmentQuestion:
    sources: *inspectai_static
    s: "https://w3id.org/ripe/ripe-kg/overall-integrity-assessment-question/1.0.0"
    po:
      - [a, ripe:OverallIntegrityAssessmentQuestion]
      - [rdfs:label, "What is the overall integrity assessment of the study?"]
      - [dcterms:identifier, "overall"]
      - [dcterms:title, "overall integrity assessment"]
      - [dcterms:hasVersion, "1.0.0"]
      - [
          rdfs:comment,
          "This overall integrity assessment question records the final integrity outcome for a work on the basis of the component assessment questions concerning retraction, post-publication notices, research-team-related concerns, and study registration.",
        ]

  # ASSESSMENT

  assessment:
    sources: &cases_root
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*]"
    s: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(id)"
    po:
      - [a, ripe:ResearchIntegrityAssessment]
      - p: ripe:assesses
        o:
          value: "$(work_uri)"
          type: iri
      - p: tido:investigates
        o:
          value: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/retraction-status/1.0.0"
          type: iri
      - p: tido:investigates
        o:
          value: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/post-publication-notices/1.0.0"
          type: iri
      - p: tido:investigates
        o:
          value: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/research-team-related-concerns/1.0.0"
          type: iri
      - p: tido:investigates
        o:
          value: "https://w3id.org/ripe/ripe-kg/integrity-assessment-question/study-registration/1.0.0"
          type: iri
      - p: tido:investigates
        o:
          value: "https://w3id.org/ripe/ripe-kg/overall-integrity-assessment-question/1.0.0"
          type: iri

  # WORK

  work:
    sources: *cases_root
    s: "$(work_uri)"
    po:
      - [a, ripe:Work]
      - [
          prism:doi,
          "$(results.checks.grobid_primary_metadata.payload.work_doi)",
        ]
      - [
          dcterms:title,
          "$(results.checks.grobid_primary_metadata.payload.main_title)",
        ]
      - p: owl:sameAs
        o:
          value: "$(results.checks.grobid_primary_metadata.payload.openalex.soa_work_uri)"
          type: iri

  # PUBLICATION DETAILS (bibliographic metadata as evidence)

  publicationDetails:
    sources: *cases_root
    s: "https://w3id.org/ripe/ripe-kg/publication-details/$(id)"
    po:
      - [a, ripe:PublicationDetails]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(id)"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(id)"
          type: iri
      - [
          dcterms:title,
          "$(results.checks.grobid_primary_metadata.payload.main_title)",
        ]
      - [
          prism:publicationDate,
          "$(results.checks.grobid_primary_metadata.payload.publication_date)",
        ]
      - [
          prism:publicationName,
          "$(results.checks.grobid_primary_metadata.payload.journal)",
        ]
      - [prism:issn, "$(results.checks.grobid_primary_metadata.payload.issn)"]
      - [prism:eIssn, "$(results.checks.grobid_primary_metadata.payload.eissn)"]
      - [
          prism:startingPage,
          "$(results.checks.grobid_primary_metadata.payload.page_from)",
        ]
      - [
          prism:endingPage,
          "$(results.checks.grobid_primary_metadata.payload.page_to)",
        ]
      - p: dcterms:publisher
        o:
          value: "https://w3id.org/ripe/ripe-kg/publisher/$(results.checks.grobid_primary_metadata.payload.publisher_id)"
          type: iri
      - p: ripe:concerns
        o:
          value: "$(work_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_automated_hypothesis_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_reviewed_hypothesis_uri)"
          type: iri

  evaluationUsesPublicationDetails:
    sources: *cases_root
    s: "https://w3id.org/ripe/ripe-kg/evaluation/$(id)"
    po:
      - p: prov:used
        o:
          value: "https://w3id.org/ripe/ripe-kg/publication-details/$(id)"
          type: iri

  publicationPublisher:
    sources: *cases_root
    s: "https://w3id.org/ripe/ripe-kg/publisher/$(results.checks.grobid_primary_metadata.payload.publisher_id)"
    po:
      - [a, prov:Organization]
      - [
          foaf:name,
          "$(results.checks.grobid_primary_metadata.payload.publisher)",
        ]

  # AUTHORS

  author:
    sources: &main_authorships
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.grobid_primary_metadata.payload.ripe_authors[*]"
    s: "https://w3id.org/ripe/ripe-kg/author/$(ripe_author_id)"
    po:
      - [a, ripe:Author]
      - [foaf:name, "$(canonical_name)"]
      - [foaf:givenName, "$(forename)"]
      - [foaf:familyName, "$(surname)"]
      - p: owl:sameAs
        o:
          value: "$(soa_author_uri)"
          type: iri

  workHasAuthor:
    sources: *main_authorships
    s: "$(work_uri)"
    po:
      - p: dcterms:creator
        o:
          value: "https://w3id.org/ripe/ripe-kg/author/$(ripe_author_id)"
          type: iri

  authorAffiliation:
    sources: &author_affiliations
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.grobid_primary_metadata.payload.ripe_author_affiliations[*]"
    s: "https://w3id.org/ripe/ripe-kg/author/$(ripe_author_id)"
    po:
      - p: org:memberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/organization/$(organization_id)"
          type: iri

  authorAffiliationOrganization:
    sources: *author_affiliations
    s: "https://w3id.org/ripe/ripe-kg/organization/$(organization_id)"
    po:
      - [a, org:Organization]
      - [foaf:name, "$(organization_label)"]

  # REVIEWER

  reviewer:
    sources:
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.reviewers.*"
    s: "https://w3id.org/ripe/ripe-kg/human-reviewer/$(rv_id)"
    po:
      - [a, ripe:HumanReviewer]
      - [dcterms:identifier, "$(rv_id)"]
      - [dbo:occupation, "$(role)"]

  # RETRACTION NOTICES - Q1.1 (referenced works)

  retractionNoticeRefQ11:
    sources: &ref_retraction_records
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.retraction_detection.payload.reference_results[*].retractions[*]"
    s: "https://w3id.org/ripe/ripe-kg/retraction-notice/$(record_id)"
    po:
      - [a, ripe:RetractionNotice]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(assessment_id)"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(assessment_id)"
          type: iri
      - [prism:doi, "$(retraction_doi)"]
      - [dcterms:title, "$(title)"]
      - p: owl:sameAs
        o:
          value: "$(openalex_notice.soa_work_uri)"
          type: iri
      - [ripe:rationale, "$(reason)"]
      - [ripe:retractionWatchRecordId, "$(record_id)"]
      - [prism:publicationDate, "$(retraction_date)"]
      - [prism:publicationName, "$(journal)"]
      - p: dcterms:publisher
        o:
          value: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/source/retraction-watch"
          type: iri
      - p: cito:retracts
        o:
          value: "$(original_work_uri)"
          type: iri
      - p: ripe:concerns
        o:
          value: "$(original_work_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_automated_hypothesis_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_reviewed_hypothesis_uri)"
          type: iri

  retractionNoticeRefQ11Publisher:
    sources: *ref_retraction_records
    s: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
    po:
      - [a, prov:Organization]
      - [foaf:name, "$(publisher)"]

  evaluationUsesRetractionNoticeRefQ11:
    sources: *ref_retraction_records
    s: "https://w3id.org/ripe/ripe-kg/evaluation/$(assessment_id)"
    po:
      - p: prov:used
        o:
          value: "https://w3id.org/ripe/ripe-kg/retraction-notice/$(record_id)"
          type: iri

  retractedPaperRefQ11:
    sources: *ref_retraction_records
    s: "$(original_work_uri)"
    po:
      - [a, ripe:Work]
      - [prism:doi, "$(original_work_doi)"]
      - [prism:publicationDate, "$(original_paper_date)"]
      - p: owl:sameAs
        o:
          value: "$(openalex_original.soa_work_uri)"
          type: iri

  # RETRACTION NOTICES - Q1.1 (main article retracted)

  retractionNoticeMainQ11:
    sources: &main_retraction_records
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.retraction_detection.payload.main_article_result.retractions[*]"
    s: "https://w3id.org/ripe/ripe-kg/retraction-notice/$(record_id)"
    po:
      - [a, ripe:RetractionNotice]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(assessment_id)"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(assessment_id)"
          type: iri
      - [prism:doi, "$(retraction_doi)"]
      - [dcterms:title, "$(title)"]
      - p: owl:sameAs
        o:
          value: "$(openalex_notice.soa_work_uri)"
          type: iri
      - [ripe:rationale, "$(reason)"]
      - [ripe:retractionWatchRecordId, "$(record_id)"]
      - [prism:publicationDate, "$(retraction_date)"]
      - [prism:publicationName, "$(journal)"]
      - p: dcterms:publisher
        o:
          value: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/source/retraction-watch"
          type: iri
      - p: cito:retracts
        o:
          value: "$(work_uri)"
          type: iri
      - p: ripe:concerns
        o:
          value: "$(work_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_automated_hypothesis_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q11_reviewed_hypothesis_uri)"
          type: iri

  retractionNoticeMainQ11Publisher:
    sources: *main_retraction_records
    s: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
    po:
      - [a, prov:Organization]
      - [foaf:name, "$(publisher)"]

  evaluationUsesRetractionNoticeMainQ11:
    sources: *main_retraction_records
    s: "https://w3id.org/ripe/ripe-kg/evaluation/$(assessment_id)"
    po:
      - p: prov:used
        o:
          value: "https://w3id.org/ripe/ripe-kg/retraction-notice/$(record_id)"
          type: iri

  # EXPRESSION OF CONCERN NOTICES - Q1.2

  eocNotice:
    sources:
      - &q12_notices
        access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.eoc_correction_detection.payload.main_article_result.notices[*]"
    s: "https://w3id.org/ripe/ripe-kg/expression-of-concern/$(record_id)"
    po:
      - [a, ripe:ExpressionOfConcern]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(assessment_id)"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(assessment_id)"
          type: iri
      - [prism:doi, "$(retraction_doi)"]
      - [dcterms:title, "$(title)"]
      - p: owl:sameAs
        o:
          value: "$(openalex_notice.soa_work_uri)"
          type: iri
      - [ripe:rationale, "$(reason)"]
      - [ripe:retractionWatchRecordId, "$(record_id)"]
      - [prism:publicationDate, "$(retraction_date)"]
      - [prism:publicationName, "$(journal)"]
      - p: dcterms:publisher
        o:
          value: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/source/retraction-watch"
          type: iri
      - p: ripe:concerns
        o:
          value: "$(work_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q12_automated_hypothesis_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q12_reviewed_hypothesis_uri)"
          type: iri
    condition:
      function: idlab-fn:equal
      parameters:
        - [grel:valueParameter, "$(ripe_notice_type)"]
        - [grel:valueParameter2, "expression-of-concern"]

  eocNoticePublisher:
    sources:
      - *q12_notices
    s: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
    po:
      - [a, prov:Organization]
      - [foaf:name, "$(publisher)"]

  evaluationUsesEocNotice:
    sources:
      - *q12_notices
    s: "https://w3id.org/ripe/ripe-kg/evaluation/$(assessment_id)"
    po:
      - p: prov:used
        o:
          value: "https://w3id.org/ripe/ripe-kg/expression-of-concern/$(record_id)"
          type: iri
    condition:
      function: idlab-fn:equal
      parameters:
        - [grel:valueParameter, "$(ripe_notice_type)"]
        - [grel:valueParameter2, "expression-of-concern"]

  correctionNotice:
    sources:
      - *q12_notices
    s: "https://w3id.org/ripe/ripe-kg/correction-notice/$(record_id)"
    po:
      - [a, ripe:CorrectionNotice]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(assessment_id)"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(assessment_id)"
          type: iri
      - [prism:doi, "$(retraction_doi)"]
      - [dcterms:title, "$(title)"]
      - p: owl:sameAs
        o:
          value: "$(openalex_notice.soa_work_uri)"
          type: iri
      - [ripe:rationale, "$(reason)"]
      - [ripe:retractionWatchRecordId, "$(record_id)"]
      - [prism:publicationDate, "$(retraction_date)"]
      - [prism:publicationName, "$(journal)"]
      - p: dcterms:publisher
        o:
          value: "https://w3id.org/ripe/ripe-kg/publisher/$(publisher_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/source/retraction-watch"
          type: iri
      - p: ripe:concerns
        o:
          value: "$(work_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q12_automated_hypothesis_uri)"
          type: iri
      - p: tido:supports
        o:
          value: "$(q12_reviewed_hypothesis_uri)"
          type: iri
    condition:
      function: idlab-fn:equal
      parameters:
        - [grel:valueParameter, "$(ripe_notice_type)"]
        - [grel:valueParameter2, "correction-notice"]

