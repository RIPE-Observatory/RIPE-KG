      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evaluation/$(assessment_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/automated-agent/inspect-ai/1.0.0"
          type: iri
  overallReviewed:
    sources:
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.inspect_sr.overall_reviewed_answered[*]"
    s: "https://w3id.org/ripe/ripe-kg/integrity-assessment-hypothesis/$(assessment_id)-human-overall"
    po:
      - [a, ripe:IntegrityAssessmentHypothesis]
      - p: prov:wasMemberOf
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(assessment_id)"
          type: iri
      - [ripe:resultOutcome, "$(reviewed_judgement)"]
      - [ripe:rationale, "$(comment)"]
      - p: tido:answers
        o:
          value: "https://w3id.org/ripe/ripe-kg/overall-integrity-assessment-question/1.0.0"
          type: iri
      - p: prov:wasGeneratedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evaluation/$(assessment_id)"
          type: iri
      - p: prov:wasAttributedTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/human-reviewer/$(reviewer_rv_id)"
          type: iri
  # EVALUATIONS (PROV-O Activities)

  evaluation:
    sources: *cases_root
    s: "https://w3id.org/ripe/ripe-kg/evaluation/$(id)"
    po:
      - [a, tido:Evaluation]
      - [prov:startedAtTime, "$(created_at_xsd)", xsd:dateTime]
      - [prov:endedAtTime, "$(updated_at_xsd)", xsd:dateTime]
      - p: prov:wasAssociatedWith
        o:
          value: "https://w3id.org/ripe/ripe-kg/automated-agent/inspect-ai/1.0.0"
          type: iri
      - p: prov:wasAssociatedWith
        o:
          value: "https://w3id.org/ripe/ripe-kg/human-reviewer/$(reviewer_rv_id)"
          type: iri
      - p: tido:contributesTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(id)"
          type: iri
      - p: prov:wasInformedBy
        o:
          value: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(id)"
          type: iri

  # EVIDENCE AGGREGATION (PROV-O Activity)

  evidenceAggregation:
    sources: *cases_root
    s: "https://w3id.org/ripe/ripe-kg/evidence-aggregation/$(id)"
    po:
      - [a, ripe:EvidenceAggregation]
      - [prov:startedAtTime, "$(created_at_xsd)", xsd:dateTime]
      - p: prov:wasAssociatedWith
        o:
          value: "https://w3id.org/ripe/ripe-kg/automated-agent/inspect-ai/1.0.0"
          type: iri
      - p: tido:contributesTo
        o:
          value: "https://w3id.org/ripe/ripe-kg/research-integrity-assessment/$(id)"
          type: iri

  # REFERENCED WORKS - Citation Graph (cito:cites)

  referencedWork:
    sources: &mapped_references
      - access: assessments/assessments_yarrrml.json
        referenceFormulation: jsonpath
        iterator: "$.assessments[*].results.checks.grobid_reference_metadata.payload.references_for_mapping[*]"
    s: "$(reference_work_uri)"
    po:
      - [a, ripe:Work]
      - [prism:doi, "$(work_doi)"]
      - [dcterms:title, "$(title)"]
      - p: owl:sameAs
        o:
          value: "$(openalex.soa_work_uri)"
          type: iri

  mainWorkCitesRef:
    sources: *mapped_references
    s: "$(source_work_uri)"
    po:
      - p: cito:cites
        o:
          value: "$(reference_work_uri)"
          type: iri
